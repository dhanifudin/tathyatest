baseUrl: http://127.0.0.1:8000
output:
  dir: tests/generated
  language: ts
coverage: all
oracle:
  errorSelector: ".invalid-feedback, [role=alert], .text-red-600, x-input-error p"
auth:
  loginPath: /login
  roles:
    - name: admin
      username: admin@example.com
      password: password
    - name: user
      username: user@example.com
      password: password
crawl:
  maxDepth: 3
  maxPages: 100
  include: []
  exclude: []
data:
  fields:
    title: Buy groceries
    body: Milk, eggs, bread
    contact_email: contact@example.com
    due_date: "2026-06-15"
    email: user@example.com
  defaults:
    text: Sample
    email: user@example.com
    number: "1"
    date: "2026-06-15"
  unique:
    - contact_email
  duplicates:
    contact_email: admin.todo.01@example.com
  requiredFields: []
  confirmFields:
    - contact_email_confirmation
  faker:
    locale: en          # faker locale for generated create/update data
    seed: null          # set an integer for reproducible data (used by the consistency metric)
evaluation:             # `tt eval` — metric-based evaluation (writes metrics/report.{json,md})
  outDir: metrics
  repeat: 10            # measurement repeats → 95% CI on timing + flake rate
  manualBaselineSecPerCase: 300   # labelled assumption for the time-savings ratio
  baselineDir: tests/manual       # hand-written reference suite for the baseline comparison
  faultProject: null   # restrict fault runs to one browser project (e.g. chromium) for speed
  stacks:              # cross-stack study; omit to evaluate the current config as one stack
    - name: blade
      dir: .
      config: tathya.blade.config.yaml
      baseUrl: http://127.0.0.1:8000
      coverage: pcov    # pcov | xdebug | none (SUT code-coverage source)
    - name: inertia
      dir: .
      config: tathya.inertia-react.config.yaml
      baseUrl: http://127.0.0.1:8001
      coverage: pcov
  faults:
    enabled: true
    classes: [validation, authz, crud, pagination, auth]
